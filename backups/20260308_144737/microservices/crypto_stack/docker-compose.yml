# Crypto Stack - .crypto Domain Resolution Service
# Deploy on: mamaduka.crypto
# Blockchain: Ethereum Mainnet
# Registry Contract: 0xD1E5b0FF1287aA9f9A268759062E4Ab08b9Dacbe

version: '3.8'

networks:
  crypto_network:
    driver: bridge
    name: crypto_stack_network

volumes:
  redis-cache:
  prometheus-data:
  eth-data:

services:
  # ==========================================
  # BLOCKCHAIN LISTENER SERVICE
  # ==========================================
  
  blockchain-listener:
    build:
      context: ./blockchain-listener
      dockerfile: Dockerfile
    container_name: crypto-blockchain-listener
    environment:
      - ETH_RPC_URL=${ETH_RPC_URL:-https://eth-mainnet.g.alchemy.com/v2/demo}
      - REGISTRY_ADDRESS=0xD1E5b0FF1287aA9f9A268759062E4Ab08b9Dacbe
      - REDIS_URL=redis://redis:6379
      - LOG_LEVEL=info
    depends_on:
      - redis
    networks:
      - crypto_network
    restart: unless-stopped
    volumes:
      - ./blockchain-listener:/app
    command: npm start

  # ==========================================
  # RESOLVER GATEWAY
  # ==========================================
  
  resolver:
    build:
      context: ./resolver
      dockerfile: Dockerfile
    container_name: crypto-resolver
    environment:
      - REGISTRY_ADDRESS=0xD1E5b0FF1287aA9f9A268759062E4Ab08b9Dacbe
      - ETH_RPC_URL=${ETH_RPC_URL:-https://eth-mainnet.g.alchemy.com/v2/demo}
      - REDIS_URL=redis://redis:6379
      - CACHE_TTL=300
      - PORT=8080
    depends_on:
      - redis
      - blockchain-listener
    networks:
      - crypto_network
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./resolver:/app

  # ==========================================
  # DNS SERVER (DNS-over-HTTPS)
  # ==========================================
  
  dns-server:
    build:
      context: ./dns-server
      dockerfile: Dockerfile
    container_name: crypto-dns-server
    environment:
      - RESOLVER_URL=http://resolver:8080
      - PORT=8053
      - DOH_PORT=8443
      - CLOUDFLARE_ENABLED=true
    depends_on:
      - resolver
    networks:
      - crypto_network
    restart: unless-stopped
    ports:
      - "8053:8053/udp"
      - "8443:8443"
    volumes:
      - ./dns-server:/app

  # ==========================================
  # CLOUDFLARE WORKER API
  # ==========================================
  
  worker-api:
    build:
      context: ./worker-api
      dockerfile: Dockerfile
    container_name: crypto-worker-api
    environment:
      - RESOLVER_URL=http://resolver:8080
      - CLOUDFLARE_ACCOUNT_ID=${CLOUDFLARE_ACCOUNT_ID}
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}
      - DOMAIN=mamaduka.crypto
      - PORT=3000
    depends_on:
      - resolver
      - dns-server
    networks:
      - crypto_network
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./worker-api:/app

  # ==========================================
  # REDIS CACHE
  # ==========================================
  
  redis:
    image: redis:7-alpine
    container_name: crypto-redis
    networks:
      - crypto_network
    restart: unless-stopped
    volumes:
      - redis-cache:/data
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru

  # ==========================================
  # NGINX REVERSE PROXY
  # ==========================================
  
  nginx:
    image: nginx:alpine
    container_name: crypto-nginx
    depends_on:
      - worker-api
      - dns-server
    networks:
      - crypto_network
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro

  # ==========================================
  # MONITORING
  # ==========================================
  
  prometheus:
    image: prom/prometheus:latest
    container_name: crypto-prometheus
    networks:
      - crypto_network
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'

  # ==========================================
  # HEALTH CHECK ENDPOINT
  # ==========================================
  
  health:
    image: node:20-alpine
    container_name: crypto-health
    working_dir: /app
    networks:
      - crypto_network
    restart: unless-stopped
    ports:
      - "8081:8081"
    volumes:
      - ./config/health-check.js:/app/index.js:ro
    command: node index.js

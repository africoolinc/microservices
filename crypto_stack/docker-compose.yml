version: '3.8'

services:
  # Ethereum Blockchain Listener - monitors .crypto registry events
  listener:
    image: node:20-alpine
    container_name: crypto_listener
    restart: unless-stopped
    environment:
      - ETH_RPC_URL=${ETH_RPC_URL:-https://eth-mainnet.g.alchemy.com/v2/demo}
      - REGISTRY_ADDRESS=0xD1E5b0FF1287aA9f9A268759062E4Ab08b9Dacbe
      - LOG_LEVEL=info
    volumes:
      - ./services/listener:/app
      - ./data:/data
    working_dir: /app
    command: npm start
    networks:
      - crypto_network

  # Resolver + API - Domain resolution and REST API
  resolver:
    image: node:20-alpine
    container_name: crypto_resolver
    restart: unless-stopped
    environment:
      - ETH_RPC_URL=${ETH_RPC_URL:-https://eth-mainnet.g.alchemy.com/v2/demo}
      - REGISTRY_ADDRESS=0xD1E5b0FF1287aA9f9A268759062E4Ab08b9Dacbe
      - CACHE_TTL=300
      - PORT=3000
    ports:
      - "3000:3000"
    volumes:
      - ./services/resolver:/app
      - ./data:/data
    working_dir: /app
    command: npm start
    networks:
      - crypto_network

  # Nginx Reverse Proxy + DNS-over-HTTPS
  api:
    image: nginx:alpine
    container_name: crypto_api
    restart: unless-stopped
    ports:
      - "8888:80"
      - "8444:443"
    volumes:
      - ./services/api/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./worker:/usr/share/nginx/html/worker:ro
    depends_on:
      - listener
      - resolver
    networks:
      - crypto_network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis Cache - for fast DNS record caching
  cache:
    image: redis:7-alpine
    container_name: crypto_cache
    restart: unless-stopped
    volumes:
      - ./data/redis:/data
    networks:
      - crypto_network
    command: redis-server --appendonly yes

networks:
  crypto_network:
    driver: bridge

version: '3.8'

services:
  # Blockchain Listener - Queries Ethereum for .crypto domain records
  blockchain-listener:
    image: node:20-alpine
    container_name: crypto-blockchain-listener
    restart: unless-stopped
    environment:
      - ETH_RPC_URL=${ETH_RPC_URL:-https://eth-mainnet.g.alchemy.com/v2/demo}
      - REGISTRY_ADDRESS=0xD1E5b0FF1287aA9f9A268759062E4Ab08b9Dacbe
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./blockchain-listener:/app
    working_dir: /app
    command: npm start
    depends_on:
      - redis
    networks:
      - crypto_network

  # DNS Resolver Gateway - Handles DNS queries for .crypto domains
  dns-resolver:
    image: node:20-alpine
    container_name: crypto-dns-resolver
    restart: unless-stopped
    ports:
      - "3053:3000"
    environment:
      - REDIS_URL=redis://redis:6379
      - ETH_RPC_URL=${ETH_RPC_URL:-https://eth-mainnet.g.alchemy.com/v2/demo}
      - REGISTRY_ADDRESS=0xD1E5b0FF1287aA9f9A268759062E4Ab08b9Dacbe
      - CLOUDFLARE_ENABLED=true
    volumes:
      - ./dns-resolver:/app
    working_dir: /app
    command: npm start
    depends_on:
      - redis
      - blockchain-listener
    networks:
      - crypto_network

  # Redis cache for DNS records
  redis:
    image: redis:7-alpine
    container_name: crypto-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - crypto_network
    command: redis-server --appendonly yes

  # Cloudflare Worker Manager - Deploys and manages CF workers
  cf-worker-manager:
    image: node:20-alpine
    container_name: crypto-cf-worker
    restart: unless-stopped
    environment:
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}
      - CLOUDFLARE_ACCOUNT_ID=${CLOUDFLARE_ACCOUNT_ID}
      - ZONE_ID=${CLOUDFLARE_ZONE_ID}
      - DOMAIN=mamaduka.crypto
    volumes:
      - ./cf-worker:/app
    working_dir: /app
    command: npm start
    networks:
      - crypto_network

networks:
  crypto_network:
    driver: bridge

volumes:
  redis_data:

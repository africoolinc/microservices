# crypto_stack - .crypto Domain Resolution Service
# Integrates UNS (.crypto) domains with Cloudflare DNS

version: '3.8'

services:
  # Blockchain Listener - Monitors .crypto registry events
  blockchain-listener:
    build:
      context: ./blockchain-listener
      dockerfile: Dockerfile
    container_name: crypto-blockchain-listener
    restart: unless-stopped
    environment:
      - ETHEREUM_RPC_URL=${ETHEREUM_RPC_URL}
      - REGISTRY_ADDRESS=0xD1E5b0FF1287aA9f9A268759062E4Ab08b9Dacbe
      - REDIS_URL=redis://redis:6379
      - LOG_LEVEL=info
    depends_on:
      - redis
    networks:
      - crypto_network
    volumes:
      - ./blockchain-listener:/app

  # Resolver Gateway - Queries .crypto resolver contracts
  resolver-gateway:
    build:
      context: ./resolver-gateway
      dockerfile: Dockerfile
    container_name: crypto-resolver-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - ETHEREUM_RPC_URL=${ETHEREUM_RPC_URL}
      - REGISTRY_ADDRESS=0xD1E5b0FF1287aA9f9A268759062E4Ab08b9Dacbe
      - REDIS_URL=redis://redis:6379
      - CACHE_TTL=300
      - LOG_LEVEL=info
    depends_on:
      - redis
      - blockchain-listener
    networks:
      - crypto_network
    volumes:
      - ./resolver-gateway:/app

  # DNS-over-HTTPS Proxy
  doh-proxy:
    build:
      context: ./doh-proxy
      dockerfile: Dockerfile
    container_name: crypto-doh-proxy
    restart: unless-stopped
    ports:
      - "8053:8053/udp"
      - "8053:8053/tcp"
    environment:
      - UPSTREAM_RESOLVER=resolver-gateway:8080
      - CLOUDFLARE_DNS=1.1.1.1
      - LOG_LEVEL=info
    depends_on:
      - resolver-gateway
    networks:
      - crypto_network
    volumes:
      - ./doh-proxy:/app

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: crypto-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - crypto_network
    volumes:
      - redis_data:/data

  # Cloudflare Worker Simulator (local testing)
  cf-worker-sim:
    build:
      context: ./cf-worker-sim
      dockerfile: Dockerfile
    container_name: crypto-cf-worker
    restart: unless-stopped
    ports:
      - "8888:8888"
    environment:
      - RESOLVER_URL=http://resolver-gateway:8080
      - CACHE_URL=redis://redis:6379
      - DOMAIN=mamaduka.crypto
      - LOG_LEVEL=info
    depends_on:
      - resolver-gateway
    networks:
      - crypto_network

  # Nginx Reverse Proxy & Load Balancer
  nginx:
    image: nginx:alpine
    container_name: crypto-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - doh-proxy
      - cf-worker-sim
    networks:
      - crypto_network

networks:
  crypto_network:
    driver: bridge

volumes:
  redis_data:

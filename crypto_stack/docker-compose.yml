version: '3.8'

services:
  # Ethereum Blockchain Listener - monitors .crypto registry events
  listener:
    build: ./services/listener
    container_name: crypto_listener
    restart: unless-stopped
    environment:
      - ETH_RPC_URL=${ETH_RPC_URL:-https://eth.llamarpc.com}
      - REGISTRY_ADDRESS=0xD1E5b0FF1287aA9f9A268759062E4Ab08b9Dacbe
      - LOG_LEVEL=info
    volumes:
      - ./data:/data
    networks:
      - crypto_network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Resolver + API - Domain resolution and REST API
  resolver:
    build: ./services/resolver
    container_name: crypto_resolver
    restart: unless-stopped
    environment:
      - ETH_RPC_URL=${ETH_RPC_URL:-https://eth.llamarpc.com}
      - REGISTRY_ADDRESS=0xD1E5b0FF1287aA9f9A268759062E4Ab08b9Dacbe
      - CACHE_TTL=300
      - PORT=3000
      - DOMAIN=mamaduka.crypto
    ports:
      - "3000:3000"
    volumes:
      - ./data:/data
    depends_on:
      - redis
    networks:
      - crypto_network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # DNS-over-HTTPS Service
  dns:
    build: ./services/dns
    container_name: crypto_dns
    restart: unless-stopped
    environment:
      - RESOLVER_URL=http://resolver:3000
      - DOMAIN=mamaduka.crypto
      - PORT=8053
    ports:
      - "8053:8053"
    depends_on:
      - resolver
    networks:
      - crypto_network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8053/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx Reverse Proxy + Cloudflare Integration
  api:
    image: nginx:alpine
    container_name: crypto_api
    restart: unless-stopped
    ports:
      - "8888:80"
      - "8443:443"
    volumes:
      - ./services/api/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./worker:/usr/share/nginx/html/worker:ro
    depends_on:
      - listener
      - resolver
      - dns
    networks:
      - crypto_network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis Cache - for fast DNS record caching
  cache:
    image: redis:7-alpine
    container_name: crypto_cache
    restart: unless-stopped
    volumes:
      - ./data/redis:/data
    networks:
      - crypto_network
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru

  # Prometheus Metrics (optional)
  metrics:
    image: prom/prometheus:latest
    container_name: crypto_metrics
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./services/metrics/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    profiles:
      - monitoring

networks:
  crypto_network:
    driver: bridge

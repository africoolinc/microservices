server {
    listen 80;
    server_name _;

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # REST API for domain resolution - proxy to resolver
    location /api/ {
        proxy_pass http://resolver:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # DNS-over-HTTPS endpoint (Cloudflare-compatible)
    location /dns-query {
        proxy_pass http://dns:8053/dns-query;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        
        # CORS headers for browser-based DNS
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Accept, Content-Type' always;
        
        # Handle preflight
        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # Simple DNS endpoint
    location /resolve {
        proxy_pass http://dns:8053/resolve;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header 'Access-Control-Allow-Origin' '*' always;
    }

    # Cloudflare Worker scripts
    location /worker/ {
        alias /usr/share/nginx/html/worker/;
        add_header 'Content-Type' 'application/javascript' always;
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'X-Content-Type-Options' 'nosniff';
    }

    # mamaduka.crypto specific resolution
    location ~ ^/domain/(?<domain>.+)$ {
        proxy_pass http://resolver:3000/api/resolve/$domain;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header 'Access-Control-Allow-Origin' '*' always;
    }

    # Main page with status
    location / {
        proxy_pass http://dns:8053/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}

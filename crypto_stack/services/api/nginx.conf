server {
    listen 80;
    server_name _;

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # REST API for domain resolution - proxy to resolver
    location /api/ {
        proxy_pass http://resolver:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # DNS-over-HTTPS endpoint
    location /dns-query {
        proxy_pass http://resolver:3000/resolve;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        
        # CORS headers
        add_header 'Access-Control-Allow-Origin' '*' always;
    }

    # Serve Cloudflare Worker scripts
    location /worker/ {
        alias /usr/share/nginx/html/worker/;
        add_header 'Content-Type' 'application/javascript' always;
        add_header 'Access-Control-Allow-Origin' '*' always;
    }

    # Main page
    location / {
        return 200 'crypto_stack running';
        add_header Content-Type text/plain;
    }
}
